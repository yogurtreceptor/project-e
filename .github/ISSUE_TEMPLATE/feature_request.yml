name: Feature request
description: Propose a focused improvement to Project E
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: Describe the user need without assuming a particular implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like Project E to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or other approaches, if any.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project fit
      options:
        - label: I have reviewed the project goal and current Stage 1 boundaries.
          required: true
        - label: This request contains no personal or sensitive data.
          required: true
